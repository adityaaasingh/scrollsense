<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WatchTrace</title>
    <link rel="stylesheet" href="sidepanel.css" />
  </head>
  <body>
    <header class="app-header">
      <div class="logo-group">
        <svg class="logo-icon" viewBox="0 0 22 14" width="22" height="14" fill="currentColor" aria-hidden="true">
          <rect x="0" y="0"    width="22" height="2.5" rx="1.25"/>
          <rect x="0" y="5.75" width="14" height="2.5" rx="1.25"/>
          <rect x="0" y="11.5" width="22" height="2.5" rx="1.25"/>
        </svg>
        <span class="logo">WATCHTRACE</span>
      </div>
    </header>

    <main class="app-main">

      <!-- ── Waiting ─────────────────────────────────────────────────────── -->
      <div id="state-waiting" class="state-view active">
        <div class="idle-hero">
          <div class="idle-pulse">
            <div class="idle-ring"></div>
            <div class="idle-dot">▶</div>
          </div>
          <p class="idle-message">Waiting for content</p>
          <p class="idle-hint">Open a YouTube video or Reddit post and WatchTrace will classify it automatically.</p>
        </div>
      </div>

      <!-- ── Loading / detected ─────────────────────────────────────────── -->
      <div id="state-detected" class="state-view">
        <div class="content-card content-card--loading">
          <p class="card-title" id="loading-title">—</p>
          <p class="card-sub"   id="loading-creator">—</p>
          <p class="card-url"   id="loading-url">—</p>
        </div>
        <div class="classifying-row">
          <div class="shimmer-bar"><div class="shimmer-fill"></div></div>
          <span class="status-text">Classifying&hellip;</span>
        </div>
      </div>

      <!-- ── Result ─────────────────────────────────────────────────────── -->
      <div id="state-result" class="state-view">

        <div class="content-card">
          <span id="result-platform-badge" class="platform-badge" hidden></span>
          <p class="card-title" id="result-title">—</p>
          <p class="card-sub"   id="result-creator">—</p>
          <a class="card-url"   id="result-url" href="#" target="_blank" rel="noopener">—</a>
        </div>

        <div class="analysis-card" id="analysis-card">
          <!-- Category row -->
          <div class="analysis-top">
            <span class="category-badge" id="result-category">—</span>
            <span class="confidence-text" id="result-confidence">—</span>
          </div>

          <!-- Score bars -->
          <div class="scores">
            <div class="score-row">
              <span class="score-label">Educational</span>
              <div class="score-track">
                <div class="score-fill" id="bar-educational"></div>
              </div>
              <span class="score-val" id="val-educational">0%</span>
            </div>
            <div class="score-row">
              <span class="score-label">Emotional</span>
              <div class="score-track">
                <div class="score-fill" id="bar-high_emotion"></div>
              </div>
              <span class="score-val" id="val-high_emotion">0%</span>
            </div>
            <div class="score-row">
              <span class="score-label">Credib. Risk</span>
              <div class="score-track">
                <div class="score-fill" id="bar-credibility_risk"></div>
              </div>
              <span class="score-val" id="val-credibility_risk">0%</span>
            </div>
          </div>
        </div>
      </div>

      <!-- ── Error ──────────────────────────────────────────────────────── -->
      <div id="state-error" class="state-view">
        <div class="content-card" id="error-content-card" hidden>
          <p class="card-title" id="error-title">—</p>
          <p class="card-sub"   id="error-creator">—</p>
        </div>
        <div class="error-body">
          <p class="error-icon">⚠</p>
          <p class="error-message" id="error-message">Classification failed.</p>
          <button id="btn-retry" class="btn-retry">Try again</button>
        </div>
      </div>

      <!-- ── Session pattern ────────────────────────────────────────────── -->
      <section class="session-section" id="session-section" hidden>
        <div class="section-header">
          <span class="section-title">Session Pattern</span>
        </div>
        <div class="session-card">
          <div class="session-label-row">
            <span class="session-label" id="session-label">—</span>
            <span class="session-diversity" id="session-diversity" hidden></span>
          </div>
          <!-- Category distribution bars -->
          <div class="session-bars" id="session-bars"></div>
          <!-- Stats row -->
          <div class="session-stats">
            <div class="stat-box">
              <p class="stat-label">Categories</p>
              <p class="stat-val" id="stat-categories">—</p>
            </div>
            <div class="stat-box">
              <p class="stat-label">Creators</p>
              <p class="stat-val" id="stat-creators">—</p>
            </div>
            <div class="stat-box">
              <p class="stat-label">Platforms</p>
              <p class="stat-val" id="stat-platforms">—</p>
            </div>
          </div>
        </div>
      </section>

      <!-- ── Session history ────────────────────────────────────────────── -->
      <section class="history-section" id="history-section">
        <div class="section-header">
          <span class="section-title">Recent</span>
        </div>
        <div class="history-list" id="history-list"></div>
      </section>

    </main>

    <script src="sidepanel.js" type="module"></script>
  </body>
</html>
